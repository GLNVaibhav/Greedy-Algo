<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HealthQueue - Allocator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>HealthQueue - Corrective Frontend</h1>

    <section id="inputs">
      <label>Total doctor time (minutes): <input id="totalSlots" type="number" step="0.1" value="60"></label>

      <div id="patients">
        <!-- Patient rows inserted here -->
      </div>

      <div id="controls">
        <button id="addPatient">Add Patient</button>
        <button id="clearPatients">Clear</button>
        <button id="run">Allocate</button>
      </div>
      <div id="formMessage" role="status" aria-live="polite"></div>
    </section>

    <section id="result">
      <h2>Result</h2>
      <pre id="jsonOut"></pre>
      <table id="resultTable">
        <thead>
          <tr><th>Patient</th><th>Emergency %</th><th>Req. Time</th><th>Allocated</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
